# lychee configuration — docs link checker (M7-3).
# https://github.com/lycheeverse/lychee#configuration

# Only check relative/internal links as errors; external URLs are warnings.
# This avoids blocking PRs on ephemeral external outages.
[response_codes]
accept = [200, 206]

# Treat external link failures as warnings (exit 0) rather than errors.
# Internal broken links still fail the job.
# See docs-links.yml: --fail only fires on errors, not warnings.

# Exclude patterns — don't chase anchors into external sites that block bots.
exclude = [
  "https://github.com/.*#.*",      # GitHub anchor URLs (rate-limited)
  "https://cloud\\.digitalocean\\.com/.*",  # DO console (login-gated)
]

# Exclude files that are intentionally placeholder or generated.
exclude_path = [
  ".venv",
  "__pycache__",
  "*.pyc",
  "coverage.xml",
  "htmlcov",
  "infra/ansible/inventory/lab",   # generated by provision.yml
]

# Timeout per request.
timeout = 10

# Max retries for external links before marking as failure.
max_retries = 3

# External HTTP errors count as warnings, not failures.
# Internal (file://) errors count as failures.
[response_codes]
exclude_status_codes = [429, 503, 999]  # rate-limiting + common bot blocks
