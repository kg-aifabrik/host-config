# Pre-commit hooks. See CODE_CONVENTIONS.md §8.2.
#
# Tests deliberately run in CI, not pre-commit, to keep the local commit loop fast.

repos:
  # ruff: lint + format. Same config as `just lint`.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy --strict on changed files. The hook only sees files git is committing,
  # which matches the "fast feedback locally" goal.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        # Additional deps install into the hook env so mypy can resolve them.
        # Add to this list when a new runtime dep lands.
        additional_dependencies: []
        args: [--strict, --config-file=pyproject.toml]

  # Secret scanning. Catches accidental credential commits.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Conventional Commits enforcement on the commit message.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - test
          - refactor
          - chore
          - ci
          - perf
          - build

  # Generic file hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
