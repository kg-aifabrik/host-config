<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 1020" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="1180" height="1020" fill="#ffffff"/>

  <!-- Title -->
  <text x="590" y="28" text-anchor="middle" font-size="18" font-weight="bold">DHCP Relay during Baremetal PXE Provisioning</text>
  <text x="590" y="48" text-anchor="middle" font-size="12" fill="#555">Sequence of broadcast → relay (giaddr) → unicast hand-offs across L3 boundaries</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f6feb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a7f37"/>
    </marker>
  </defs>

  <!-- Lifeline headers -->
  <!-- Host -->
  <rect x="40" y="70" width="200" height="50" rx="6" fill="#e8f0fe" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="140" y="92" text-anchor="middle" font-weight="bold">Baremetal Host</text>
  <text x="140" y="108" text-anchor="middle" font-size="11" fill="#555">NIC PXE firmware</text>

  <!-- ToR -->
  <rect x="320" y="70" width="200" height="50" rx="6" fill="#fff4e5" stroke="#bf6900" stroke-width="1.5"/>
  <text x="420" y="92" text-anchor="middle" font-weight="bold">ToR Switch (L3 SVI)</text>
  <text x="420" y="108" text-anchor="middle" font-size="11" fill="#555">DHCP relay agent</text>

  <!-- DHCP -->
  <rect x="600" y="70" width="200" height="50" rx="6" fill="#e6f4ea" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="700" y="92" text-anchor="middle" font-weight="bold">DHCP Server</text>
  <text x="700" y="108" text-anchor="middle" font-size="11" fill="#555">Kea / ISC, mgmt subnet</text>

  <!-- Boot -->
  <rect x="880" y="70" width="240" height="50" rx="6" fill="#fbe9ee" stroke="#a3253f" stroke-width="1.5"/>
  <text x="1000" y="92" text-anchor="middle" font-weight="bold">Boot Server</text>
  <text x="1000" y="108" text-anchor="middle" font-size="11" fill="#555">TFTP + HTTP (iPXE, kernel, seed)</text>

  <!-- Lifelines (dashed) -->
  <line x1="140" y1="120" x2="140" y2="990" stroke="#888" stroke-dasharray="4 4"/>
  <line x1="420" y1="120" x2="420" y2="990" stroke="#888" stroke-dasharray="4 4"/>
  <line x1="700" y1="120" x2="700" y2="990" stroke="#888" stroke-dasharray="4 4"/>
  <line x1="1000" y1="120" x2="1000" y2="990" stroke="#888" stroke-dasharray="4 4"/>

  <!-- ========== PHASE 1: DHCP discovery ========== -->
  <rect x="40" y="138" width="1080" height="20" fill="#f0f0f0" stroke="#ccc"/>
  <text x="50" y="153" font-weight="bold" font-size="12" fill="#333">Phase 1 — DHCP exchange (broadcast on client VLAN, unicast across fabric via relay)</text>

  <!-- 1. DISCOVER broadcast -->
  <line x1="140" y1="180" x2="418" y2="180" stroke="#1f6feb" stroke-width="1.6" marker-end="url(#arrow-blue)"/>
  <text x="279" y="174" text-anchor="middle" font-size="12" fill="#1f6feb" font-weight="bold">1. DHCPDISCOVER (L2 broadcast)</text>
  <text x="279" y="192" text-anchor="middle" font-size="11" fill="#333">src 0.0.0.0:68 → 255.255.255.255:67  | chaddr=ac:1f:6b:aa:bb:cc  xid=0x3903F326</text>

  <!-- 2. Relay forwards as unicast -->
  <line x1="422" y1="222" x2="698" y2="222" stroke="#1f6feb" stroke-width="1.6" marker-end="url(#arrow-blue)"/>
  <text x="560" y="216" text-anchor="middle" font-size="12" fill="#1f6feb" font-weight="bold">2. DHCPDISCOVER (unicast, relayed)</text>
  <text x="560" y="234" text-anchor="middle" font-size="11" fill="#333">src 10.10.1.1:67 → 10.0.0.5:67  |  giaddr=10.10.1.1  +  Option 82 (circuit-id: Eth1/12, vlan 100)</text>

  <!-- 3. OFFER to relay -->
  <line x1="698" y1="266" x2="422" y2="266" stroke="#1a7f37" stroke-width="1.6" marker-end="url(#arrow-green)"/>
  <text x="560" y="260" text-anchor="middle" font-size="12" fill="#1a7f37" font-weight="bold">3. DHCPOFFER (unicast → giaddr)</text>
  <text x="560" y="278" text-anchor="middle" font-size="11" fill="#333">yiaddr=10.10.1.42  netmask /24  gw=10.10.1.1  next-server=10.0.0.9  filename="ipxe.efi"  T1/T2 leases</text>

  <!-- 4. OFFER broadcast back to host -->
  <line x1="418" y1="310" x2="142" y2="310" stroke="#1a7f37" stroke-width="1.6" marker-end="url(#arrow-green)"/>
  <text x="279" y="304" text-anchor="middle" font-size="12" fill="#1a7f37" font-weight="bold">4. DHCPOFFER (broadcast onto VLAN)</text>
  <text x="279" y="322" text-anchor="middle" font-size="11" fill="#333">dst chaddr ac:1f:6b:aa:bb:cc  (host has no IP yet → broadcast flag)</text>

  <!-- 5. REQUEST -->
  <line x1="140" y1="354" x2="418" y2="354" stroke="#1f6feb" stroke-width="1.6" marker-end="url(#arrow-blue)"/>
  <text x="279" y="348" text-anchor="middle" font-size="12" fill="#1f6feb" font-weight="bold">5. DHCPREQUEST (broadcast)</text>
  <text x="279" y="366" text-anchor="middle" font-size="11" fill="#333">requested-ip=10.10.1.42  server-id=10.0.0.5</text>

  <!-- 6. Relayed REQUEST -->
  <line x1="422" y1="398" x2="698" y2="398" stroke="#1f6feb" stroke-width="1.6" marker-end="url(#arrow-blue)"/>
  <text x="560" y="392" text-anchor="middle" font-size="12" fill="#1f6feb" font-weight="bold">6. DHCPREQUEST (unicast, giaddr=10.10.1.1)</text>

  <!-- 7. ACK -->
  <line x1="698" y1="430" x2="422" y2="430" stroke="#1a7f37" stroke-width="1.6" marker-end="url(#arrow-green)"/>
  <text x="560" y="424" text-anchor="middle" font-size="12" fill="#1a7f37" font-weight="bold">7. DHCPACK (unicast → giaddr)</text>

  <!-- 8. ACK to host -->
  <line x1="418" y1="462" x2="142" y2="462" stroke="#1a7f37" stroke-width="1.6" marker-end="url(#arrow-green)"/>
  <text x="279" y="456" text-anchor="middle" font-size="12" fill="#1a7f37" font-weight="bold">8. DHCPACK (broadcast onto VLAN)</text>
  <text x="279" y="474" text-anchor="middle" font-size="11" fill="#333">host now owns 10.10.1.42 + knows next-server &amp; filename</text>

  <!-- ========== PHASE 2: TFTP bootloader ========== -->
  <rect x="40" y="498" width="1080" height="20" fill="#f0f0f0" stroke="#ccc"/>
  <text x="50" y="513" font-weight="bold" font-size="12" fill="#333">Phase 2 — Bootloader fetch (TFTP, then iPXE chainloads HTTP)</text>

  <!-- 9. TFTP RRQ -->
  <line x1="140" y1="544" x2="998" y2="544" stroke="#222" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="569" y="538" text-anchor="middle" font-size="12" font-weight="bold">9. TFTP RRQ "ipxe.efi"</text>
  <text x="569" y="556" text-anchor="middle" font-size="11" fill="#333">10.10.1.42 → 10.0.0.9:69  (routed normally; no relay needed — host has an IP now)</text>

  <!-- 10. TFTP DATA -->
  <line x1="998" y1="582" x2="142" y2="582" stroke="#222" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="569" y="576" text-anchor="middle" font-size="12" font-weight="bold">10. TFTP DATA blocks → iPXE binary</text>

  <!-- 11. iPXE runs, requests script over HTTP -->
  <line x1="140" y1="620" x2="998" y2="620" stroke="#222" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="569" y="614" text-anchor="middle" font-size="12" font-weight="bold">11. HTTP GET /boot.ipxe?mac=ac:1f:6b:aa:bb:cc</text>
  <text x="569" y="632" text-anchor="middle" font-size="11" fill="#333">iPXE chainloaded; identifies itself by MAC so server can render per-host script</text>

  <!-- 12. iPXE script response -->
  <line x1="998" y1="658" x2="142" y2="658" stroke="#222" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="569" y="652" text-anchor="middle" font-size="12" font-weight="bold">12. 200 OK — iPXE script (kernel + initrd + cmdline)</text>

  <!-- ========== PHASE 3: kernel + seed ========== -->
  <rect x="40" y="688" width="1080" height="20" fill="#f0f0f0" stroke="#ccc"/>
  <text x="50" y="703" font-weight="bold" font-size="12" fill="#333">Phase 3 — Kernel, initrd, cloud-init seed (this repo's output)</text>

  <!-- 13. GET kernel -->
  <line x1="140" y1="734" x2="998" y2="734" stroke="#222" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="569" y="728" text-anchor="middle" font-size="12" font-weight="bold">13. HTTP GET /images/vmlinuz, /images/initrd.img</text>

  <line x1="998" y1="766" x2="142" y2="766" stroke="#222" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="569" y="760" text-anchor="middle" font-size="12" font-weight="bold">14. 200 OK — kernel + initrd streamed</text>

  <!-- 15. cloud-init seed -->
  <line x1="140" y1="804" x2="998" y2="804" stroke="#222" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="569" y="798" text-anchor="middle" font-size="12" font-weight="bold">15. HTTP GET /seed/&lt;hostname&gt;/user-data + meta-data</text>
  <text x="569" y="816" text-anchor="middle" font-size="11" fill="#333">rendered from Netbox intent by host-config renderer (this repo)</text>

  <line x1="998" y1="842" x2="142" y2="842" stroke="#222" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="569" y="836" text-anchor="middle" font-size="12" font-weight="bold">16. 200 OK — cloud-init seed applied at first boot</text>

  <!-- Final note box -->
  <rect x="140" y="880" width="860" height="90" rx="6" fill="#fffbe6" stroke="#b08800"/>
  <text x="155" y="902" font-weight="bold" font-size="12">Key invariants</text>
  <text x="155" y="922" font-size="11">• Only DHCP traffic needs the relay — once the host has an IP, normal L3 routing carries TFTP/HTTP.</text>
  <text x="155" y="940" font-size="11">• `giaddr` is what lets the DHCP server pick the right scope without being on the client's subnet (RFC 2131 §4.1).</text>
  <text x="155" y="958" font-size="11">• Option 82 + DHCP snooping pin a MAC to a switchport, so a rogue host on the wrong port can't claim another's boot identity.</text>
</svg>
