# Local Ansible configuration. Points the runtime at our roles directory
# so playbooks can name roles by their short name.

[defaults]
roles_path = roles
inventory = inventory
host_key_checking = False
# `stdout_callback = yaml` is nicer to read but requires the
# community.general collection. Sticking with the default callback to
# keep deps minimal; revisit if we install community.general for
# other reasons.
