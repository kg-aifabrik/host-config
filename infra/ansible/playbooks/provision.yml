---
# Provision a DigitalOcean Droplet for the host-config lab.
#
# Usage:
#   cd infra/ansible
#   ansible-galaxy collection install -r requirements.yml
#   ansible-playbook -i localhost, playbooks/provision.yml
#
# Required environment variables (in .env or exported):
#   DIGITALOCEAN_TOKEN      — DO API token with read+write scope
#   SSH_KEY_FINGERPRINT     — fingerprint of an SSH key registered with DO
#
# Outputs:
#   infra/ansible/inventory/lab  — INI file consumed by deploy-lab.yml
#
# Idempotency:
#   community.digitalocean.digital_ocean_droplet with unique_name: true
#   is a no-op if a Droplet with the same name already exists.

- name: Provision DO lab Droplet
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Secrets — sourced from environment; never committed.
    _do_token: "{{ lookup('env', 'DIGITALOCEAN_TOKEN') }}"
    _ssh_key_fp: "{{ lookup('env', 'SSH_KEY_FINGERPRINT') }}"

    # Droplet configuration — override via -e on the command line.
    lab_droplet_name: "host-config-lab"
    lab_region: "tor1"
    # s-4vcpu-8gb-intel: Premium Intel (4 vCPU / 8 GB / NVMe SSD).
    # AMD Premium / CPU-Optimised slugs are not exposed on this account
    # in tor1; this Premium Intel tier still upgrades the e2e VM tests from
    # SATA to NVMe vs. the basic s-4vcpu-8gb shared-CPU + SATA tier.
    lab_droplet_size: "s-4vcpu-8gb-intel"
    lab_droplet_image: "ubuntu-24-04-x64"
    lab_droplet_tags:
      - host-config-lab

  tasks:
    # ------------------------------------------------------------------
    # Guard: fail fast if secrets are missing.
    # ------------------------------------------------------------------
    - name: Assert required secrets are present
      ansible.builtin.assert:
        that:
          - _do_token | length > 0
          - _ssh_key_fp | length > 0
        fail_msg: >
          DIGITALOCEAN_TOKEN and SSH_KEY_FINGERPRINT must be set.
          See .env.example and docs/runbooks/deploy-do.md.

    # ------------------------------------------------------------------
    # Create (or find the existing) Droplet.
    # ------------------------------------------------------------------
    - name: Create Droplet (idempotent via unique_name)
      community.digitalocean.digital_ocean_droplet:
        state: present
        oauth_token: "{{ _do_token }}"
        name: "{{ lab_droplet_name }}"
        region_id: "{{ lab_region }}"
        size_id: "{{ lab_droplet_size }}"
        image_id: "{{ lab_droplet_image }}"
        ssh_keys:
          - "{{ _ssh_key_fp }}"
        tags: "{{ lab_droplet_tags }}"
        unique_name: true
        wait: true
        wait_timeout: 300
      register: _droplet

    - name: Extract Droplet IPv4
      ansible.builtin.set_fact:
        _droplet_ip: "{{ _droplet.data.droplet.networks.v4 | selectattr('type', 'equalto', 'public') | map(attribute='ip_address') | first }}"

    # ------------------------------------------------------------------
    # Write local inventory file so deploy-lab.yml can target the Droplet.
    # ------------------------------------------------------------------
    - name: Write dynamic inventory to infra/ansible/inventory/lab
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../inventory/lab"
        content: |
          # Generated by provision.yml — do not edit by hand.
          [lab]
          {{ _droplet_ip }} ansible_user=root
        mode: "0644"

    # ------------------------------------------------------------------
    # Wait for SSH to be responsive before handing off to deploy-lab.yml.
    # ------------------------------------------------------------------
    - name: Wait for SSH on {{ _droplet_ip }}
      ansible.builtin.wait_for:
        host: "{{ _droplet_ip }}"
        port: 22
        timeout: 120
        state: started

    - name: Lab Droplet is ready
      ansible.builtin.debug:
        msg: >
          Droplet {{ lab_droplet_name }} is up at {{ _droplet_ip }}.
          Run: ansible-playbook -i inventory/lab playbooks/deploy-lab.yml
